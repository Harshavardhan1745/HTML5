<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Track</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="shortcut icon" href="../assets/favicon_io (1)/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100">
    <main class="grid grid-cols-[280px_1fr] h-screen">
        <aside class="bg-white shadow-2xl ">
            <!-- logo -->
            <div class="flex items-center gap-2 p-2">
                <img src="../assets/dashboard_logo.png" alt="logo" width="90" height="90" class="pb-2">
                <div class="flex flex-col">
                    <h1 class="text-2xl font-bold leading-none">
                        <span class="text-[#082850]">BUILD</span><span class="text-orange-600">TRACK</span>
                    </h1>

                    <p class="text-xs text-gray-400 mt-1">
                        Construction Project Monitoring
                    </p>
                </div>
            </div>
            <hr>

            <!-- menu -->

            <div class="flex flex-col justify-between">
                <ul class="flex flex-col gap-6 p-4">
                    <li><a href="../adminPanal/adminDashboard.html" class="p-3 rounded-lg hover:bg-[#082850] hover:text-white"><i
                                class="fa-solid fa-table-cells-large"></i> Dashboard</a></li>
                    <li><a href="#" class="p-3 rounded-lg hover:bg-[#082850] hover:text-white"><i
                                class="fa-solid fa-trowel-bricks"></i> Projects</a></li>
                    <li><a href="#" class="p-3 rounded-lg hover:bg-[#082850] hover:text-white"><i
                                class="fa-solid fa-box"></i> Materials</a></li>
                    <li><a href="#" class="p-3 rounded-lg hover:bg-[#082850] hover:text-white"><i
                                class="fa-solid fa-calendar-days"></i> Schedule</a></li>
                    <li><a href="#" class="p-3 rounded-lg hover:bg-[#082850] hover:text-white"><i
                                class="fa-solid fa-location-dot"></i> Site Monitoring</a></li>
                    <li><button class="p-3 rounded-lg bg-[#082850] text-white"><i
                                class="fa-solid fa-users"></i> Workers</button></li>
                    <li><a href="#" class="p-3 rounded-lg hover:bg-[#082850] hover:text-white"><i
                                class="fa-solid fa-chart-line"></i> Reports</a></li>
                    <li><a href="#" class="p-3 rounded-lg hover:bg-[#082850] hover:text-white"><i
                                class="fa-solid fa-triangle-exclamation"></i> Issues</a></li>
                </ul>
                <hr>
                <ul class="flex flex-col gap-6 p-4">
                    <li><a href="#" class="p-3 rounded-lg hover:bg-[#082850] hover:text-white"><i
                                class="fa-solid fa-gear"></i> Settings</a></li>
                    <li><a href="#" class="p-3 rounded-lg hover:bg-[#082850] hover:text-white"><i
                                class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
                </ul>
            </div>
        </aside>

        <!-- main content -->

        <section class="bg-gray-100 p-3 overflow-y-auto">
            <!-- navbar -->

            <div class="bg-white p-4 rounded shadow">
                <div class="flex justify-between items-center">
                    <div class="relative w-80">
                        <i
                            class="fa-solid fa-magnifying-glass absolute left-3  top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="text" placeholder="Search..."
                            class="w-full h-10 border border-gray-300 rounded-lg pl-10 pr-4 focus:outline-none focus:ring-1 focus:ring-gray-500">
                    </div>
                    <div>
                        <a href="#" class="font-medium text-gray-500"><i class="fa-solid fa-users"></i>
                            Add New Worker</a>
                    </div>
                </div>
            </div>

            <!-- worker cards -->

            <div class="mt-3">
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-6">
                    <div class="bg-white p-4">
                        <div class="flex flex-col justify-center items-center">
                            <div class="flex flex-col gap-1 justify-center items-center">
                                <div>
                                    <img src="../../../CSS/assets/image/profile/profile.jpeg" alt="loading"
                                        class="rounded-full w-20 h-20">
                                </div>
                                <div class="flex flex-col justify-center items-center">
                                    <h1 class="font-medium">Harshavardhan G</h1>
                                    <p class="text-sm font-medium">Design wrk</p>
                                </div>
                            </div>
                            <div class="p-2 flex flex-col gap-1">
                                <div class="flex justify-between gap-3 items-center">
                                    <p class="text-xs text-gray-500 font-medium">STARTED ON </p>
                                    <p class="text-xs text-gray-500 font-medium">8 MAY 2021</p>
                                </div>
                                <hr>
                                <div class="flex justify-between gap-3 items-center">
                                    <p class="text-xs text-gray-500 font-medium">WORKED HERE </p>
                                    <p class="text-xs text-gray-500 font-medium">3 YEARS</p>
                                </div>
                            </div>
                            <h1 class="text-sm font-medium"><i class="fa-solid fa-circle text-green-600"></i>Active</h1>
                            <div class="p-2">
                                <button class="bg-blue-900 p-2 w-40 rounded text-white">Contact</button>
                            </div>
                            <a href="#" class="underline text-xs font-medium text-gray-500">See more information</a>
                        </div>
                    </div>
                </div>
            </div>

        </section>
    </main>

    <script src="https://kit.fontawesome.com/c219e56bfb.js" crossorigin="anonymous"></script>

</html>
