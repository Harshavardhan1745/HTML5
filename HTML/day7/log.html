<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <center>
        <main>
            <h1>Login</h1><br>
            <form>
                <input type="text" placeholder="Enter your mail" required><br><br>
                <input type="password" placeholder="Enter password" minlength="8" maxlength="12" required><br><br>
                <input type="submit" name="Login">
            </form>
        </main><br><br><hr>
        <section>
            <h1>Sign up</h1>
            <form action="">
                <input type="text" placeholder="Enter username" minlength="5" maxlength="20" required><br><br>
                <input type="email" placeholder="Enter mail" required><br><br>
                <input type="password" placeholder="Enter password" minlength="8" maxlength="12" required><br><br>
                <input type="submit" value="Sign in"><br></br>
                <input type="submit" value="Login">
            </form>
        </section>
    </center>
</body>
</html>
