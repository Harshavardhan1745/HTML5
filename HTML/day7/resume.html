<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume</title>
</head>
<body>
        <main>
            <center>
            <h1>Resume Builder</h1>
            </center>
            <form>         
              <fieldset>
                <legend>Presonal Details</legend>
                <input type="text" placeholder="Enter name" required><br><br>
                <input type="number" placeholder="Enter number" required><br><br>
                <input type="email" placeholder="Enter mail" required><br><br>
                <textarea name="Address" rows="3" cols="30"> </textarea><br><br>
              </fieldset>  <br><br>
              <fieldset>
                <legend>Education Details</legend>
                <input type="text" placeholder="Qualification"><br><br>
                <input type="text" placeholder="College Name "><br><br>
                <input type="text" placeholder="Year of passing"><br><br>
              </fieldset><br><br>
              <fieldset>
                <legend>Skills</legend>
                <input type="checkbox">HTML <br><br>
                <input type="checkbox">CSS <br><br>
                <input type="checkbox">JavaScript <br><br>
                <input type="checkbox">My Sql <br><br>
              </fieldset><br><br>
              <fieldset>
                <legend>Experience</legend>
                <textarea rows="3" cols="30" placeholder="About your work Experience "></textarea>
              </fieldset><br><br>
              <fieldset>
                <legend>Resume</legend>
                <input type="file">
              </fieldset><br><br>
              <center>
                <input type="submit" value="Build Resume">
              </center>
            </form>
        </main>
</body>
</html>
