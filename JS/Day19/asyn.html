<script>
    function addData(callback){
        console.log("downloading....");
        setTimeout(()=>{
            console.log("download completed....");
            callback()
        },3000);
    }   
    function install(){
        console.log("installing");
        
    }
    addData(install)

    function datas(){
        return new Promise((resolve,reject)=>{
            setTimeout(()=>{
                resolve("Data recevied..")
            },5000)
        })
    }
    async function getData() {
        try{
            const data = await datas()
            console.log(data);
            
        }catch(error){
            console.log(error);
            
        }
    }

    getData()
</script>
