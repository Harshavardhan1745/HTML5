<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <center>
        <main>
            <div>
                <h1>Student CSC Registration Form</h1>
            </div>
            <form>
                <label>Enter your name : <input type="text"></label><br><br>
                <label>Enter your mail : <input type="email" required></label><br><br>
                <label>Enter password : <input type="password"></label><br><br>
                <label>Gender :<input type="radio" name="Gender">Male <input type="radio" name="Gender">Female </label><br><br>
                <label>Hobbies : <input type="text" placeholder="eg.Reading,Sports,Music"></label><br><br>
                <label>Course : <select required>
                    <option value="" selected disabled>Choose one..</option>
                    <option value="">HTML</option>
                    <option value="">CSS</option>
                    <option value="">Node</option>
                    <option value="">My Sql</option>
                </select>
                </label><br><br>
                <label>Address : <textarea rows="4" cols="30" placeholder="Enter your address"></textarea></label><br><br>
                <input type="submit" value="Register"><br><br>
                <input type="reset"><br><br>
            </form>
        </main>
    </center>
</body>
</html>
