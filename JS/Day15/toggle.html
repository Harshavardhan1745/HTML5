<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="flex justify-center gap-3 flex-col p-5">
        <div>
            <button onclick="box()" class="bg-black text-white rounded p-2 w-50">click to hide</button>
        </div>
        <div  id="box"style="display: flex;" class="bg-blue-500 text-white p-2 rounded">
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Eligendi, reprehenderit perspiciatis! Fugit error deserunt impedit dolorem dicta. Dignissimos nisi accusantium quisquam alias dolorum laboriosam, accusamus fugiat quaerat in minus dolorem?</p>
        </div>
    </div>
   <input type="text" onchange="clicktohide()" class="border w-25 ml-5">

    <script>
        function box(){
            const tog = document.getElementById("box")

            if(tog.style.display === "none"){
                tog.style.display ="block"
            }else{
                tog.style.display="none"
            }
        }
        function clicktohide(){
            const input = document.getElementById("box")

            if(input === "hide"){
                input.style.display = "none"
            }else if(input === "show"){
                input.style.display = "block"
            }
        }
        
    </script>
</body>

</html>
