<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="m-6 flex justify-center">
        <div class="flex bg-orange-300 w-fit p-2  rounded">
            <form class="flex flex-col p-6 gap-4" id="showData">
                <h1 class="text-xl text-center">Personal Information</h1>
                <input type="text" placeholder="Enter name" id="userName" class="border border-stone p-2 rounded-md">
                <input type="email" placeholder="Enter mail" id="userEmail" class="border border-stone p-2 rounded-md">
                <input type="password" placeholder="Enter the password" id="userPassword"
                    class="border border-stone p-2 rounded-md">
                <label class="flex gap-3 items-center" id="userGender">Gender :
                    <input type="radio" name="gender">Male
                    <input type="radio" name="gender">Female
                </label>
                <textarea id="description" placeholder="enter something"
                    class="border border-stone p-2 rounded-md"></textarea>
                <button onclick="clicktoAdd()" class="bg-black p-2 text-white rounded">Submit</button>
            </form>
        </div>
    </div>


    <div class="bg-blue-300 m-5 p-5 rounded text-white" id="displaydata"> 
        <div >
        
        </div>
    </div>

    <script>
        let arr =JSON.parse(localStorage.getItem("UserDatas")) || []
        function clicktoAdd() {
            const username = document.getElementById("userName").value
            const useremail = document.getElementById("userEmail").value
            const userpassword = document.getElementById("userPassword").value
            const usergender = document.getElementById("userGender").value
            const userdescription = document.getElementById("description").value

            const datas = {username,useremail,userpassword,usergender,userdescription}
            arr.push(datas)


            localStorage.setItem("UserDatas",JSON.stringify(arr))
        }

        function displaydata(){
            const display = document.getElementById("displaydata")
            display.innerHTML = ""

            arr.forEach((e,i)=>{

                display.innerHTML += `
                 
                <h2> User : ${i + 1}</h2>

                <p>Name : ${e.username}</p>
                <p>Email : ${e.useremail}</p>
                <p>Gender : ${e.usergender}</p>
                <p>About : ${e.userdescription}</p>

                `
            })
        }
        displaydata()
    </script>
</body>

</html>
