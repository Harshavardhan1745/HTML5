<html>
    <head>
        <title>Anime.in</title>
    </head>
    <body>  
        <center>
        <main>
            <div>
                <img src="../images/AnimeClub.jpeg" alt="loading" width="800" height="300">
            </div>
            <div>
                <h1>Anime Fan Club</h1>
                <h2>Register</h2><br><br><br>
            </div>
            <div>
               <label>Enter your name :</label>
               <input type="text" placeholder="Enter name"><br><br>
               <label>Email :</label>
               <input type="email" placeholder="Enter gmail"><br><br>
               <label>Create password :</label>
               <input type="password" minlength="8" placeholder="enter password"><br><br>
               <label>re-enter :</label>
               <input type="password" minlength="8" placeholder="re-enter password"><br><br>
               <label>Favorite Anime:</label>
               <input type="text" placeholder="eg.Jujutsu Kaisen..Solo Leveling"><br><br>
               <label>Favorite Anime Genre:</label><br>
               <select required><br><br>
                 <option value="">Select Genre</option>
                 <option>Action</option>
                 <option>Romance</option>
                 <option>Comedy</option>
                 <option>Fantasy</option>
                 <option>Horror</option>
                 <option>Sci-Fi</option>
               </select> <br><br>
               <label>Favorite Anime Character :</label>
               <input type="text" placeholder="enter Character name"><br><br>
               <label>Choose Your Anime Team  </label><br><br>
               <input type="radio" name="Choose Your Anime Team :">Team naruto
               <input type="radio" name="Choose Your Anime Team :">Team boruto
               <input type="radio" name="Choose Your Anime Team :">Team Gojo <br><br>
               <label>Upload Anime Profile Picture :</label>
               <input type="file"><br><br>
               <input type="submit" name="Join the Club"><br><br>
               <input type="reset" >
            </div>
        </main><br><br>
        <div>
            <img src="../images/Every-Monday-Join-us-for-a-watch-party-discussion-and-Activity-1.png" alt="loading" height="300" width="800">
        </div> 
        </center>
    </body>
</html>
